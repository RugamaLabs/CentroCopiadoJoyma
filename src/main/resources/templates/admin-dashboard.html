<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Centro Fotocopiado Joyma</title>
    <!-- Fuentes de Google y Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vincula los estilos compartidos -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <header th:replace="~{fragments/common :: admin-header}"></header>

    <div class="admin-layout">
        <aside th:replace="~{fragments/common :: admin-sidebar('pedidos')}"></aside>

        <!-- Contenedor Principal (Admin Dashboard) -->
        <main class="admin-content">
            <section class="dashboard-header" style="text-align: left; padding: 20px 0;">
                <h1 class="section-title">Gestión de Pedidos</h1>
                <p>Aquí puedes ver todos los pedidos realizados por los clientes y modificar su estado.</p>
            </section>

            <!-- Banner de Actualización Exitosa -->
            <div th:if="${successMessage}" id="successBanner" class="success-message" style="margin-bottom: 20px;">
                <i class="fa-solid fa-circle-check" style="margin-right: 8px;"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <section class="orders-section">
                <div th:if="${orders.empty}" class="info-box" style="text-align: center; min-height: auto;">
                    <p>No hay pedidos registrados en el sistema actualmente.</p>
                </div>

                <div th:unless="${orders.empty}" class="orders-grid">
                    <!-- Tarjeta para cada pedido -->
                    <div class="service-card" th:each="order : ${orders}" style="flex-direction: column; align-items: flex-start;">
                        <h3 th:text="'Pedido #' + ${order.id}">Pedido #1</h3>
                        <p style="margin-top: 10px; font-weight: bold;">
                            Cliente: <span th:text="${order.customer != null ? order.customer.name : 'Desconocido'}" style="color: var(--primary-light);"></span>
                        </p>
                        <p style="color: var(--text-color); margin-top: 5px;">
                            Monto: $<span th:text="${order.totalAmount}">0.00</span>
                        </p>
                        <p style="color: #666; font-size: 14px; margin-top: 5px; margin-bottom: 15px;">
                            Fecha: <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>
                        
                        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd; margin-bottom: 15px;">

                        <!-- Formulario para cambiar estado -->
                        <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" style="width: 100%;">
                            <label for="statusSelect" style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Estado del Pedido:</label>
                            <select name="status" id="statusSelect" class="form-group input" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px;">
                                <option th:each="statusOption : ${allStatuses}" 
                                        th:value="${statusOption}" 
                                        th:text="${statusOption}"
                                        th:selected="${statusOption == order.status}"></option>
                            </select>
                            <button type="submit" class="login-btn" style="padding: 8px; font-size: 14px;">Actualizar Estado</button>
                        </form>
                        <a th:href="@{'/admin/orders/' + ${order.id}}" class="login-btn" style="display: inline-block; text-align: center; padding: 8px; font-size: 14px; margin-top: 8px; background: #1565c0; text-decoration: none;">
                            <i class="fa-solid fa-eye"></i> Visualizar Detalle
                        </a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>

    <script>
        // Auto-ocultar el banner de éxito después de 5 segundos
        const banner = document.getElementById('successBanner');
        if (banner) {
            setTimeout(() => {
                banner.style.transition = 'opacity 0.6s ease';
                banner.style.opacity = '0';
                setTimeout(() => banner.remove(), 600);
            }, 5000);
        }
    </script>
</body>

</html>
