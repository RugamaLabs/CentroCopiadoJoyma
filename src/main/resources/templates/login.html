<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centro Fotocopiado Joyma</title>
    <!-- Fuentes de Google y Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vincula los estilos compartidos -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Los estilos específicos de login ahora están en styles.css -->
</head>

<body>
    <header th:replace="~{fragments/common :: customer-header}"></header>

    <!-- Contenedor Principal (Login Form) -->
    <main class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fa-solid fa-user-lock"></i>
                <h2>Iniciar Sesión</h2>
            </div>

            <div th:if="${success}" class="success-message" id="successBanner">
                <i class="fa-solid fa-circle-check"></i>
                <span th:text="${success}"></span>
            </div>
            
            <div th:if="${error}" class="error-message">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Nombre de Usuario o Email</label>
                    <input type="text" id="username" name="username" placeholder="Ej: Jonathan Rugama" required
                        autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="login-btn">Ingresar <i class="fa-solid fa-arrow-right-to-bracket"
                        style="margin-left: 5px;"></i></button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <span style="color: var(--text-color);">¿No tienes una cuenta? </span>
                <a th:href="@{/register}" style="color: var(--primary-color); font-weight: 500; text-decoration: none;">Regístrate aquí</a>
            </div>
        </div>
    </main>
    
    <script>
        // Ocultar banner de éxito después de 5 segundos
        const successBanner = document.getElementById('successBanner');
        if (successBanner) {
            setTimeout(() => {
                successBanner.style.transition = "opacity 0.5s ease";
                successBanner.style.opacity = "0";
                setTimeout(() => successBanner.remove(), 500);
            }, 5000);
        }
    </script>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
