<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Centro Fotocopiado Joyma</title>
    <!-- Fuentes de Google y Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vincula los estilos compartidos -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <!-- Encabezado con navegación superior -->
    <header class="main-header">
        <div class="logo">
            <i class="fa-solid fa-water"></i>
            <div>Copycenter Joyma</div>
        </div>
        <nav class="header-nav">
            <a th:href="@{/}"><i class="fa-solid fa-house"></i> Inicio</a>
            <a th:href="@{/login}"><i class="fa-solid fa-user"></i> Login</a>
        </nav>
    </header>

    <!-- Contenedor Principal (Registro Form) -->
    <main class="login-container">
        <div class="login-box" style="max-width: 550px;">
            <div class="login-header">
                <i class="fa-solid fa-user-plus"></i>
                <h2>Crea tu Cuenta</h2>
            </div>

            <div th:if="${error}" class="error-message">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej: Jonathan Rugama" required autofocus>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                </div>

                <div class="form-group">
                    <label for="address">Dirección</label>
                    <input type="text" id="address" name="address" placeholder="Tu dirección principal" required>
                </div>

                <button type="submit" class="login-btn">Registrarse <i class="fa-solid fa-check" style="margin-left: 5px;"></i></button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <span style="color: var(--text-color);">¿Ya tienes una cuenta? </span>
                <a th:href="@{/login}" style="color: var(--primary-color); font-weight: 500; text-decoration: none;">Inicia sesión aquí</a>
            </div>
        </div>
    </main>

    <!-- Pie de página -->
    <footer class="main-footer">
        <div class="social-icons-wrapper">
            <a href="#" class="social-btn facebook"><i class="fa-brands fa-square-facebook"></i></a>
            <a href="#" class="social-btn whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
        <div class="footer-title">
            Copycenter Joyma
        </div>
    </footer>
</body>

</html>
