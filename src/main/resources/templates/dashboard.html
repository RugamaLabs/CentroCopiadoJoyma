<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Centro Fotocopiado Joyma</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <header th:replace="~{fragments/common :: customer-header}"></header>

    <main class="main-content">
        <section class="dashboard-header">
            <h1 class="section-title" th:text="'Bienvenido, ' + ${customer.name}">Dashboard del Cliente</h1>
            <p>Aquí puedes revisar el estado de tus pedidos o crear uno nuevo.</p>
            <br>
            <button class="login-btn" style="width: auto; padding: 10px 20px; margin-bottom: 20px;" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Crear Nuevo Pedido
            </button>
        </section>

        <section class="orders-section">
            <h2 class="section-title" style="font-size: 28px;">Mis Pedidos</h2>
            
            <div th:if="${orders.empty}" class="info-box" style="text-align: center; min-height: auto;">
                <p>No tienes pedidos actualmente.</p>
            </div>

            <div th:unless="${orders.empty}" class="orders-grid">
                <div class="service-card" th:each="order : ${orders}" style="flex-direction: column; align-items: flex-start;">
                    <h3 th:text="'Pedido #' + ${order.id}">Pedido #1</h3>
                    <p style="margin-top: 10px; font-weight: bold; color: var(--primary-light);">
                        Estado: <span th:text="${order.status}"> RECEIVED </span>
                    </p>
                    <p style="color: var(--text-color); margin-top: 5px;">
                        Total: &#8353;<span th:text="${order.totalAmount}">0.00</span>
                    </p>
                    <p style="color: #666; font-size: 14px; margin-top: 3px;">
                        Anticipo: &#8353;<span th:text="${order.requiredAdvancePayment}">0.00</span>
                    </p>
                    <p style="color: #666; font-size: 14px; margin-top: 5px;">
                        Fecha: <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                    </p>
                    <p th:if="${order.orderItems != null}" style="color: #888; font-size: 13px; margin-top: 5px;">
                        <span th:text="${order.orderItems.size()}">0</span> servicio(s)
                    </p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de Creación de Pedido -->
    <div id="orderModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="login-header" style="margin-bottom: 20px;">
                <h2 style="font-size: 24px;">Crear Pedido</h2>
            </div>
            
            <form th:action="@{/orders}" method="post" id="orderForm">
                <div class="order-items-container" id="itemsContainer">
                    <!-- Los items se agregan dinámicamente -->
                </div>

                <button type="button" class="add-item-btn" onclick="addItemRow()">
                    <i class="fa-solid fa-plus"></i> Agregar Servicio
                </button>

                <!-- Totales -->
                <div class="totals-box" id="totalsBox" style="display: none;">
                    <div class="total-line">
                        <span>Total Acumulado:</span>
                        <span id="grandTotal">&#8353;0.00</span>
                    </div>
                    <div class="total-line grand">
                        <span>Anticipo Requerido (50%):</span>
                        <span id="advancePayment">&#8353;0.00</span>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="submitBtn" disabled style="opacity: 0.5;">
                    Enviar Pedido <i class="fa-solid fa-paper-plane" style="margin-left: 5px;"></i>
                </button>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/common :: footer}"></footer>

    <script th:inline="javascript">
        var modal = document.getElementById("orderModal");
        var itemCount = 0;

        // Datos de servicios desde el servidor
        var servicesData = /*[[${services}]]*/ [];

        function openModal() {
            modal.style.display = "block";
            if (itemCount === 0) addItemRow();
        }

        function closeModal() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) modal.style.display = "none";
        }

        function addItemRow() {
            itemCount++;
            var container = document.getElementById('itemsContainer');
            var row = document.createElement('div');
            row.className = 'item-row';
            row.id = 'item-' + itemCount;

            var serviceOptions = '<option value="" disabled selected>Seleccionar servicio...</option>';
            servicesData.forEach(function(s) {
                var price = s.basePrice;
                var discountInfo = '';
                if (s.discount && s.discount.isActive) {
                    discountInfo = ' (-' + s.discount.percentage + '%)';
                }
                serviceOptions += '<option value="' + s.id + '" data-price="' + price + '"'
                    + (s.discount && s.discount.isActive ? ' data-discount="' + s.discount.percentage + '"' : '')
                    + '>' + s.name + ' - &#8353;' + price + discountInfo + '</option>';
            });

            row.innerHTML =
                '<div class="item-header">' +
                    '<h4><i class="fa-solid fa-cart-plus"></i> Servicio #' + itemCount + '</h4>' +
                    (itemCount > 1 ? '<button type="button" class="remove-item-btn" onclick="removeItemRow(\'' + row.id + '\')"><i class="fa-solid fa-xmark"></i></button>' : '') +
                '</div>' +
                '<div class="item-fields">' +
                    '<div class="full-width">' +
                        '<label>Servicio</label>' +
                        '<select name="serviceId" required onchange="recalculate()">' + serviceOptions + '</select>' +
                    '</div>' +
                    '<div>' +
                        '<label>Cantidad (juegos)</label>' +
                        '<input type="number" name="quantity" min="1" value="1" required onchange="recalculate()" oninput="recalculate()">' +
                    '</div>' +
                    '<div>' +
                        '<label>Rango de Páginas (ej: 1-15)</label>' +
                        '<input type="text" name="pageRange" placeholder="1-10" onchange="recalculate()" oninput="recalculate()">' +
                    '</div>' +
                    '<div>' +
                        '<label>Páginas a cobrar</label>' +
                        '<input type="text" class="billable-pages" readonly value="0" style="background: #eee;">' +
                    '</div>' +
                    '<div class="full-width">' +
                        '<label>URL del Archivo</label>' +
                        '<input type="url" name="fileUrl" placeholder="https://drive.google.com/...">' +
                    '</div>' +
                    '<div class="full-width">' +
                        '<label>Nota para el empleado</label>' +
                        '<textarea name="note" placeholder="Instrucciones especiales (opcional)"></textarea>' +
                    '</div>' +
                '</div>' +
                '<div class="subtotal-display">Subtotal: &#8353;<span class="item-subtotal">0.00</span></div>';

            container.appendChild(row);
            recalculate();
        }

        function removeItemRow(id) {
            var row = document.getElementById(id);
            if (row) row.remove();
            recalculate();
        }

        function recalculate() {
            var rows = document.querySelectorAll('.item-row');
            var grandTotal = 0;

            rows.forEach(function(row) {
                var select = row.querySelector('select[name="serviceId"]');
                var qtyInput = row.querySelector('input[name="quantity"]');
                var rangeInput = row.querySelector('input[name="pageRange"]');
                var billableDisplay = row.querySelector('.billable-pages');
                var subtotalDisplay = row.querySelector('.item-subtotal');

                if (!select || !select.value) {
                    billableDisplay.value = '0';
                    subtotalDisplay.textContent = '0.00';
                    return;
                }

                var option = select.options[select.selectedIndex];
                var basePrice = parseFloat(option.dataset.price) || 0;
                var discount = parseFloat(option.dataset.discount) || 0;
                var unitPrice = basePrice * (1 - discount / 100);

                var quantity = parseInt(qtyInput.value) || 1;
                var billablePages = parseBillablePages(rangeInput.value);
                billableDisplay.value = billablePages;

                var subtotal = unitPrice * quantity * billablePages;
                subtotalDisplay.textContent = subtotal.toFixed(2);
                grandTotal += subtotal;
            });

            document.getElementById('grandTotal').textContent = '₡' + grandTotal.toFixed(2);
            document.getElementById('advancePayment').textContent = '₡' + (grandTotal * 0.5).toFixed(2);

            var totalsBox = document.getElementById('totalsBox');
            var submitBtn = document.getElementById('submitBtn');
            if (rows.length > 0) {
                totalsBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            } else {
                totalsBox.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            }
        }

        function parseBillablePages(range) {
            if (!range || !range.trim()) return 1;
            var parts = range.split('-');
            if (parts.length === 2) {
                var start = parseInt(parts[0].trim());
                var end = parseInt(parts[1].trim());
                if (!isNaN(start) && !isNaN(end) && end >= start) {
                    return end - start + 1;
                }
            }
            return 1;
        }
    </script>
</body>

</html>
